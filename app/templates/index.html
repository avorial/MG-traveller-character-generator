<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traveller — Character Generation Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=VT323&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <header class="terminal-header">
    <div class="header-glow"></div>
    <div class="header-content">
      <div class="header-left">
        <span class="imperial-crest">⚝</span>
        <span class="terminal-id">TAS-GEN-9042</span>
      </div>
      <h1 class="title">
        <span class="title-main">TRAVELLER</span>
        <span class="title-sub">Character Generation Terminal</span>
      </h1>
      <div class="header-right">
        <span class="status-dot"></span>
        <span class="status-text">READY</span>
      </div>
    </div>
  </header>

  <main class="layout">
    <!-- LEFT: Character Sheet (always visible) -->
    <aside class="sheet" id="sheet">
      <!-- Rendered by JS -->
    </aside>

    <!-- CENTER: Active Phase Panel -->
    <section class="stage" id="stage">
      <!-- Rendered by JS -->
    </section>

    <!-- RIGHT: Activity Log -->
    <aside class="log-panel">
      <div class="panel-header">
        <span class="led"></span>
        <span>MISSION LOG</span>
      </div>
      <ol class="log" id="log"></ol>
    </aside>
  </main>

  <footer class="terminal-footer">
    <div class="footer-left">
      <button class="text-btn" id="btn-export">EXPORT JSON</button>
      <label class="text-btn" for="import-file">IMPORT JSON</label>
      <input type="file" id="import-file" accept=".json" hidden />
      <button class="text-btn" id="btn-reset">NEW CHARACTER</button>
    </div>
    <div class="footer-right">
      <span class="footer-note">Mongoose Traveller — Core Rulebook</span>
    </div>
  </footer>

  <!-- Data from server for bootstrapping -->
  <script id="bootstrap-species" type="application/json">{{ species_list | tojson }}</script>
  <script id="bootstrap-careers" type="application/json">{{ careers_list | tojson }}</script>
  <script src="/static/js/app.js"></script>
</body>
</html>
