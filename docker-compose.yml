services:
  traveller:
    build: .
    container_name: traveller-creator
    ports:
      - "8000:8000"
    volumes:
      # Mount the app directory so edits to data/*.json and templates
      # are picked up live without a rebuild. Reload rules via
      # POST /api/reload-rules or just refresh the browser.
      - ./app:/code/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
